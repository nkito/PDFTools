name: Build and optionally publish PDFPagePicker for Windows

on:
  workflow_dispatch:
    inputs:
      script_path:
        description: "exe化する Python スクリプトのパス (リポジトリルートからの相対パス)"
        required: true
        default: "pdfpagepicker.py"
        type: string
      exe_name:
        description: "出力する exe 名 (拡張子不要)"
        required: true
        default: "pdfpagepicker"
        type: string
      release_tag:
        description: "Release に登録するタグ名 (空なら Release は作らない)"
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --noconsole `
            --name "${{ github.event.inputs.exe_name }}" `
            "${{ github.event.inputs.script_path }}"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFPagePicker-windows
          path: dist/${{ github.event.inputs.exe_name }}.exe

      - name: Create GitHub Release and upload exe
        if: ${{ github.event.inputs.release_tag != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.release_tag }}" `
            "dist/${{ github.event.inputs.exe_name }}.exe" `
            --target "${{ github.sha }}" `
            --title "${{ github.event.inputs.exe_name }} ${{ github.event.inputs.release_tag }}" `
            --generate-notes
