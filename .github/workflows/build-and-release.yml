name: Build and optionally publish PDFTools for Windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release に登録するタグ名 (空なら Release は作らない)"
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Build pdfmerger with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --noconsole `
            --name pdfmerger `
            pdfmerger.py

      - name: Build pdfpagepicker with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --noconsole `
            --name pdfpagepicker `
            pdfpagepicker.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFMerger-windows
          path: dist/pdfmerger.exe
                dist/pdfpagepicker.exe

      - name: Create GitHub Release and upload exe
        if: ${{ github.event.inputs.release_tag != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.release_tag }}" `
            "dist/pdfmerger.exe" `
            "dist/pdfpagepicker.exe" `
            --target "${{ github.sha }}" `
            --title "PDFTools ${{ github.event.inputs.release_tag }}" `
            --generate-notes
